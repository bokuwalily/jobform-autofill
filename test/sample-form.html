<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><title>サンプルES（table＋div 両レイアウト）</title></head>
<body>
<h1>エントリーフォーム（テスト）</h1>

<!-- ① table レイアウト -->
<form><table>
  <tr><th>氏名</th><td>姓<input id="sei" name="last_name"> 名<input id="mei" name="first_name"></td></tr>
  <tr><th>カナ氏名</th><td>姓<input id="seik" name="last_kana"> 名<input id="meik" name="first_kana"></td></tr>
  <!-- e2r 模倣：例示テキスト「例（姓：…　名：…）」が同一td内に同居。姓/名の両欄を汚染しないか -->
  <tr><th>氏名 ※</th><td><p>例（姓：マツシタ　名：タロウ）</p>姓<input id="sei2" name="kanji_sei"> 名<input id="mei2" name="kanji_mei"></td></tr>
  <tr><th>カナ氏名 ※</th><td><p>例（姓：マツシタ　名：タロウ）</p>姓<input id="seik2" name="kana_sei"> 名<input id="meik2" name="kana_mei"><span>（全角カナ入力のみ）</span></td></tr>
  <tr><th>生年月日</th><td>
    <select id="by"><option value="">年</option><option>2002</option><option>2003</option></select>年
    <select id="bm"><option value="">月</option><option>9</option><option>10</option></select>月
    <select id="bd"><option value="">日</option><option>16</option><option>17</option></select>日</td></tr>
  <tr><th>性別</th><td>
    <label><input type="radio" name="gender" value="male">男性</label>
    <label><input type="radio" name="gender" value="female">女性</label></td></tr>
  <tr><th>大学入学年月</th><td><input id="adY">年<input id="adM">月</td></tr>
  <tr><th>出身高校名</th><td><input id="hs"></td></tr>
  <tr><th>高校卒業年</th><td><input id="hsg"></td></tr>
  <tr><th>コース名</th><td><input id="course"></td></tr>
</table></form>

<!-- ② div ブロックレイアウト（axol 等を模倣：ラベルdiv → 入力div） -->
<div class="form2">
  <div class="field"><div class="lbl">郵便番号</div><div class="ipt"><input id="dzip1" maxlength="3"> - <input id="dzip2" maxlength="4"></div></div>
  <div class="field"><div class="lbl">都道府県</div><div class="ipt"><select id="dpref"><option value="">選択</option><option>東京都</option><option>大阪府</option></select></div></div>
  <div class="field"><div class="lbl">市区郡町村</div><div class="ipt"><input id="dcity"></div></div>
  <div class="field"><div class="lbl">学校区分</div><div class="ipt">
    <label><input type="radio" name="dstype" value="daigakuin">大学院</label>
    <label><input type="radio" name="dstype" value="daigaku">大学</label></div></div>
  <div class="field"><div class="lbl">自宅電話番号</div><div class="ipt">
    <input id="dh1" maxlength="4" value="090"> - <input id="dh2" maxlength="4" value="1234"> - <input id="dh3" maxlength="4" value="5678"></div></div>
  <div class="field"><div class="lbl">携帯電話番号</div><div class="ipt">
    <input id="dm1" maxlength="4"> - <input id="dm2" maxlength="4"> - <input id="dm3" maxlength="4"></div></div>
  <div class="field"><div class="lbl">メールアドレス</div><div class="ipt"><span>入力ミス防止のため同じメールアドレスを2度ご記入ください。携帯電話のメールアドレスはご遠慮ください。</span><input id="dmail"> <input id="dmailc"><span>(確認用)</span></div></div>
  <div class="field"><div class="lbl">メールアドレス2</div><div class="ipt"><input id="dmail2"> <input id="dmail2c"><span>(確認用)</span></div></div>
  <!-- axol 模倣：本体/確認用が各boxの上のサブラベル＋placeholder -->
  <div class="field"><div class="lbl">メールアドレス</div><div class="ipt">
    <div class="col"><div class="sub">メールアドレス</div><input id="amail" type="email" placeholder="メールアドレス"></div>
    <div class="col"><div class="sub">確認用</div><input id="amailc" type="email" placeholder="確認用"></div></div></div>
</div>
</body></html>
