<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5B5BF0"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD24A"/>
      <stop offset="1" stop-color="#FB9D2B"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0B1A4A" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="url(#bg)"/>
  <!-- subtle top highlight -->
  <rect x="16" y="16" width="480" height="240" rx="120" fill="#FFFFFF" opacity="0.06"/>

  <!-- form card -->
  <g filter="url(#cardShadow)">
    <rect x="116" y="96" width="280" height="320" rx="34" fill="#FFFFFF"/>
  </g>

  <!-- header bar (title) -->
  <rect x="152" y="140" width="120" height="22" rx="11" fill="#1E293B"/>

  <!-- field 1: filled (accent) with check -->
  <rect x="152" y="196" width="208" height="34" rx="12" fill="#EEF2FF"/>
  <rect x="152" y="196" width="150" height="34" rx="12" fill="#4F46E5"/>
  <!-- field 2: filled (accent) -->
  <rect x="152" y="248" width="208" height="34" rx="12" fill="#EEF2FF"/>
  <rect x="152" y="248" width="120" height="34" rx="12" fill="#6366F1"/>
  <!-- field 3: empty -->
  <rect x="152" y="300" width="208" height="34" rx="12" fill="#E2E8F0"/>

  <!-- lightning bolt badge (auto / instant) -->
  <g transform="translate(296,250)">
    <circle cx="44" cy="44" r="74" fill="#FFFFFF"/>
    <circle cx="44" cy="44" r="62" fill="url(#bolt)"/>
    <path d="M50 12 L24 52 L42 52 L36 78 L66 36 L46 36 Z"
          fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
